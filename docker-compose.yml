version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sm_postgres
    environment:
      POSTGRES_DB: smart_metering
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smartpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart -d smart_metering"]
      interval: 10s
      timeout: 5s
      retries: 6

  grafana:
    image: grafana/grafana-oss:latest
    container_name: sm_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sm_api
    environment:
      DATABASE_URL: postgresql+psycopg2://smart:smartpass@postgres:5432/smart_metering
      SMART_METERING_API_BACKEND: db
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: sm_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nodered:
    image: nodered/node-red:latest
    container_name: sm_nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto

  influxdb:
    image: influxdb:2
    container_name: sm_influxdb
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  postgres_data:
  grafana_data:
  nodered_data:
  influx_data:
